<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Premium</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --primary-blue: #4d7cff;
            --dark-blue: #3a63d2;
            --accent-gold: #eebc2c;
            --bg-light: #f0f4ff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--primary-blue);
            /* Patrón de puntos sutil como en la imagen */
            background-image: radial-gradient(#ffffff33 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Contenedor principal con diseño de tarjeta flotante */
        .container {
            position: relative;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 380px;
            overflow: hidden;
            z-index: 1;
        }

        /* Elementos decorativos (Hojas abstractas) */
        .container::before {
            content: "🌿"; /* Emoji como placeholder de icono tropical */
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 100px;
            opacity: 0.1;
            transform: rotate(20deg);
        }

        .header-icons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .icon-leaf {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        h2 {
            color: var(--primary-blue);
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        p {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: -15px;
        }

        input[type="email"] {
            padding: 16px;
            border: 2px solid #edf2ff;
            border-radius: 12px;
            background: #f8faff;
            font-size: 1rem;
            color: #333;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: white;
            box-shadow: 0 0 0 4px rgba(77, 124, 255, 0.1);
        }

        button {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 15px rgba(77, 124, 255, 0.4);
        }

        button:hover {
            background: var(--dark-blue);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #status-msg {
            margin-top: 20px;
            font-size: 0.9rem;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-icons">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="var(--primary-blue)">
            <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,11 17,8 17,8Z"/>
        </svg>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--accent-gold)">
            <path d="M21,12.79V11.21L19,10.14L19.5,7.86L17.21,7.36L16.14,5.36L13.86,5.86L12,3.86L10.14,5.86L7.86,5.36L6.79,7.36L4.5,7.86L5,10.14L3,11.21V12.79L5,13.86L4.5,16.14L6.79,16.64L7.86,18.64L10.14,18.14L12,20.14L13.86,18.14L16.14,18.64L17.21,16.64L19.5,16.14L19,13.86L21,12.79Z"/>
        </svg>
    </div>

    <h2>Newsletter</h2>
    <p>Únete a nuestra lista VIP y recibe contenido exclusivo cada semana.</p>
    
    <form id="contact-form" class="form-group">
    <label for="to_email">Tu correo institucional</label>
    <input type="email" name="to_email" id="to_email" placeholder="tunombre@correo.com" required>
    <button type="submit" id="submit-btn">Suscribirme</button>
</form>
</div>

<script>
    (function() {
        // Asegúrate de usar tu PUBLIC KEY real aquí
        emailjs.init("baiVRGfOOSw6bii5A"); 
    })();

    const btn = document.getElementById('submit-btn');

    document.getElementById('contact-form').addEventListener('submit', function(event) {
        event.preventDefault();

        btn.innerText = 'Verificando...';

        // Enviamos el formulario directamente
        emailjs.sendForm('service_eap49aw', 'template_e5qq19h', this)
            .then(function() {
                alert('¡Enviado con éxito a santiago.jarav@uniagustiniana.edu.co!');
                btn.innerText = '¡Listo!';
            }, function(error) {
                console.error('FAILED...', error);
                alert('Fallo el envío: ' + JSON.stringify(error));
                btn.innerText = 'Error al enviar';
            });
    });
</script>

</body>
</html>
