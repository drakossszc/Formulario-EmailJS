<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Premium</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
    :root {
        --primary-blue: #4d7cff;
        --dark-blue: #3a63d2;
        --accent-gold: #eebc2c;
        --bg-light: #f0f4ff;
    }

    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: var(--primary-blue);
        font-family: 'Segoe UI', Roboto, sans-serif;
        overflow: hidden; /* Evita que las formas creen scroll */
        position: relative;
    }

    /* --- FONDO DINÁMICO --- */
    
    /* Capa de patrón de puntos */
    body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(#ffffff22 2px, transparent 2px);
        background-size: 30px 30px;
        z-index: 0;
    }

    /* Formas geométricas animadas */
    .shape {
        position: absolute;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px);
        border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        z-index: 0;
        animation: morph 15s linear infinite alternate;
    }

    .shape-1 {
        width: 400px;
        height: 400px;
        top: -100px;
        left: -100px;
        background: linear-gradient(45deg, var(--accent-gold), transparent);
        opacity: 0.4;
    }

    .shape-2 {
        width: 300px;
        height: 300px;
        bottom: -50px;
        right: -50px;
        background: linear-gradient(135deg, var(--dark-blue), #000);
        opacity: 0.6;
        animation-duration: 20s;
        border-radius: 50%;
    }

    .shape-3 {
        width: 150px;
        height: 150px;
        top: 20%;
        right: 15%;
        background: white;
        opacity: 0.15;
        animation: float 8s ease-in-out infinite;
    }

    @keyframes morph {
        0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: rotate(0deg); }
        100% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; transform: rotate(40deg); }
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-40px) rotate(10deg); }
    }

    /* --- CONTENEDOR (TARJETA) --- */
    .container {
        position: relative;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 380px;
        z-index: 10;
        border: 1px solid rgba(255, 255, 255, 0.3);
        animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Estilo decorativo superior */
    .container::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 8px;
        background: linear-gradient(90deg, var(--accent-gold), var(--primary-blue));
        border-radius: 30px 30px 0 0;
    }

    .header-icons {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
    }

    /* Animación para los iconos del header */
    .header-icons svg {
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
    }

    h2 {
        color: var(--primary-blue);
        font-size: 28px;
        margin-bottom: 8px;
        font-weight: 900;
    }

    p {
        color: #555;
        font-size: 0.95rem;
        margin-bottom: 30px;
        line-height: 1.5;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    label {
        font-size: 0.75rem;
        font-weight: 800;
        color: var(--accent-gold);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: -15px;
        margin-left: 5px;
    }

    input[type="email"] {
        padding: 18px;
        border: 2px solid #eee;
        border-radius: 15px;
        background: #fff;
        font-size: 1rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input[type="email"]:focus {
        outline: none;
        border-color: var(--primary-blue);
        box-shadow: 0 10px 20px rgba(77, 124, 255, 0.15);
        transform: scale(1.02);
    }

    button {
        background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
        color: white;
        border: none;
        padding: 18px;
        border-radius: 15px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 8px 20px rgba(77, 124, 255, 0.4);
    }

    button:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 12px 25px rgba(77, 124, 255, 0.5);
    }

    button:active {
        transform: translateY(0);
    }
</style>
</head>
<body>

<div class="container">
    <div class="header-icons">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="var(--primary-blue)">
            <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,11 17,8 17,8Z"/>
        </svg>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--accent-gold)">
            <path d="M21,12.79V11.21L19,10.14L19.5,7.86L17.21,7.36L16.14,5.36L13.86,5.86L12,3.86L10.14,5.86L7.86,5.36L6.79,7.36L4.5,7.86L5,10.14L3,11.21V12.79L5,13.86L4.5,16.14L6.79,16.64L7.86,18.64L10.14,18.14L12,20.14L13.86,18.14L16.14,18.64L17.21,16.64L19.5,16.14L19,13.86L21,12.79Z"/>
        </svg>
    </div>

    <h2>Newsletter</h2>
    <p>Únete a nuestra lista VIP y recibe contenido exclusivo cada semana.</p>
    
    <form id="contact-form" class="form-group">
    <label for="to_email">Tu correo institucional</label>
    <input type="email" name="to_email" id="to_email" placeholder="tunombre@correo.com" required>
    <button type="submit" id="submit-btn">Suscribirme</button>
</form>
</div>

<script>
    (function() {
        // Asegúrate de usar tu PUBLIC KEY real aquí
        emailjs.init("baiVRGfOOSw6bii5A"); 
    })();

    const btn = document.getElementById('submit-btn');

    document.getElementById('contact-form').addEventListener('submit', function(event) {
        event.preventDefault();

        btn.innerText = 'Verificando...';

        // Enviamos el formulario directamente
        emailjs.sendForm('service_eap49aw', 'template_e5qq19h', this)
            .then(function() {
                alert('¡Enviado con éxito a santiago.jarav@uniagustiniana.edu.co!');
                btn.innerText = '¡Listo!';
            }, function(error) {
                console.error('FAILED...', error);
                alert('Fallo el envío: ' + JSON.stringify(error));
                btn.innerText = 'Error al enviar';
            });
    });
</script>

</body>
</html>
